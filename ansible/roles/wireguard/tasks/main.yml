---
- name: Install wireguard
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
  become: yes

- name: Check for existing private key
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wg_priv
  become: yes

- name: Generate WireGuard keypair if missing
  ansible.builtin.shell: |
    umask 077
    cd /etc/wireguard
    wg genkey | tee privatekey | wg pubkey > publickey
  become: yes
  when: not wg_priv.stat.exists

- name: Read private key
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wg_priv_b64
  become: yes

- name: Read public key (for operator to enroll on zephyr)
  ansible.builtin.slurp:
    src: /etc/wireguard/publickey
  register: wg_pub_b64
  become: yes

- name: Render wg0.conf with IP-literal endpoint
  ansible.builtin.copy:
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: '0600'
    backup: yes
    content: |
      [Interface]
      PrivateKey = {{ wg_priv_b64.content | b64decode | trim }}
      Address = {{ wg_address }}/24
      ListenPort = {{ wg_listen_port }}

      [Peer]
      # zephyr (hub)
      PublicKey = {{ wg_hub_pubkey }}
      Endpoint = {{ wg_hub_endpoint_ip }}:{{ wg_hub_endpoint_port }}
      AllowedIPs = {{ wg_allowed_ips }}
      PersistentKeepalive = {{ wg_keepalive }}
  become: yes
  notify: Restart wg-quick

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: yes
    state: started
  become: yes

- name: Show public key (enroll this on zephyr's wg0.conf manually)
  ansible.builtin.debug:
    msg: |
      WireGuard public key for this host: {{ wg_pub_b64.content | b64decode | trim }}
      If this is a new host, add a [Peer] block to zephyr's /etc/wireguard/wg0.conf
      with this PublicKey and AllowedIPs = {{ wg_address }}/32, then `wg syncconf`.
