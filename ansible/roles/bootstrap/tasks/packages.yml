---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ bootstrap_base_packages }}"
    state: present
  become: yes

- name: Install media pipeline packages
  ansible.builtin.apt:
    name: "{{ bootstrap_media_packages }}"
    state: present
  become: yes
  when: bootstrap_install_icecast2 | bool
