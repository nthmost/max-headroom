[defaults]
# Inventory file
inventory = inventory.yml

# Roles path
roles_path = roles

# Don't create .retry files
retry_files_enabled = False

# Show diff when files change
diff_always = True

# Increase timeout for slow connections
timeout = 30

# SSH pipelining for performance
pipelining = True

# Host key checking (set to True for production)
host_key_checking = False

# Vault password file (create this locally, don't commit)
# vault_password_file = ~/.ansible/vault_password

[ssh_connection]
# SSH arguments for jump host support
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=yes

[privilege_escalation]
# Default to using sudo
become = False
become_method = sudo
become_ask_pass = False
