<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHBN // INTAKE STATION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #FFB000;
    --amber-dim: #c07800;
    --amber-faint: #5a3400;
    --green: #00FF88;
    --green-dim: #007a40;
    --red-bright: #FF2200;
    --dark: #080800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--amber);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    min-height: 100vh;
    animation: flicker 8s infinite;
  }
  @keyframes flicker {
    0%, 97%, 100% { opacity: 1; }
    97.5% { opacity: 0.94; }
    98%   { opacity: 1; }
    98.8% { opacity: 0.96; }
    99%   { opacity: 1; }
  }

  .scanner {
    height: 4px; background: var(--dark); position: relative; overflow: hidden;
    border-bottom: 1px solid #220000;
  }
  .scanner::after {
    content: ''; position: absolute; top: 0; height: 100%; width: 120px;
    background: linear-gradient(90deg, transparent, var(--red-bright), #FF6600, var(--red-bright), transparent);
    animation: scan 2.2s ease-in-out infinite alternate;
    box-shadow: 0 0 18px 6px var(--red-bright);
  }
  @keyframes scan { from { left: -120px; } to { left: 100%; } }

  header {
    padding: 14px 28px 10px;
    border-bottom: 1px solid var(--amber-dim);
    display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap;
  }
  header h1 { font-family: 'VT323', monospace; font-size: 2rem; letter-spacing: 0.08em; }
  header .sub { font-size: 0.85rem; letter-spacing: 0.25em; color: var(--amber-dim); }

  main {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 60px);
  }

  /* ── Left panel: submit form ── */
  .panel-submit {
    border-right: 1px solid var(--amber-dim);
    padding: 20px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 18px;
  }

  .panel-title {
    font-size: 0.85rem; letter-spacing: 0.3em; color: var(--amber);
    border-bottom: 1px solid var(--amber-dim);
    padding-bottom: 6px;
  }

  .source-tabs { display: flex; gap: 2px; }
  .tab {
    flex: 1; padding: 6px 4px; border: 1px solid var(--amber-dim);
    background: transparent; color: var(--amber-dim); cursor: pointer;
    font-family: inherit; font-size: 0.85rem; letter-spacing: 0.15em;
    transition: all 0.1s;
  }
  .tab.active { border-color: var(--amber); color: var(--amber); background: var(--amber-faint); }
  .tab:hover:not(.active) { border-color: var(--amber); color: var(--amber); }

  label { display: block; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--amber); margin-bottom: 4px; }

  input[type=text], select, textarea {
    width: 100%; padding: 7px 10px;
    background: #0d0d00; border: 1px solid var(--amber-dim);
    color: var(--amber); font-family: inherit; font-size: 0.95rem;
    outline: none; resize: vertical;
  }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--amber); }
  select option { background: #0d0d00; }

  .length-group { display: flex; gap: 4px; }
  .len-btn {
    flex: 1; padding: 6px 2px; border: 1px solid var(--amber-dim);
    background: transparent; color: var(--amber-dim); cursor: pointer;
    font-family: inherit; font-size: 0.8rem; letter-spacing: 0.15em;
    transition: all 0.1s;
  }
  .len-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-faint); }
  .len-btn:hover:not(.active) { border-color: var(--amber); color: var(--amber); }

  #playlist-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--amber); }
  #playlist-toggle input { width: auto; }

.submit-btn {
    width: 100%; padding: 10px; border: 1px solid var(--amber);
    background: var(--amber-faint); color: var(--amber); cursor: pointer;
    font-family: 'VT323', monospace; font-size: 1.3rem; letter-spacing: 0.2em;
    transition: all 0.1s;
  }
  .submit-btn:hover { background: var(--amber); color: var(--dark); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; background: transparent; }

  #submit-msg { font-size: 0.85rem; min-height: 1.2em; letter-spacing: 0.1em; }
  #submit-msg.ok { color: var(--green); }
  #submit-msg.err { color: var(--red-bright); }

  .analyze-btn {
    width: 100%; padding: 6px; border: 1px solid var(--amber-dim);
    background: transparent; color: var(--amber-dim); cursor: pointer;
    font-family: inherit; font-size: 0.85rem; letter-spacing: 0.2em;
    transition: all 0.1s;
  }
  .analyze-btn:hover { border-color: var(--amber); color: var(--amber); }
  .analyze-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Modal ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 100;
    justify-content: center; align-items: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--dark); border: 1px solid var(--amber);
    padding: 24px 28px; width: min(500px, 94vw);
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 0 60px rgba(255,176,0,0.12);
  }
  .modal-header {
    font-family: 'VT323', monospace; font-size: 1.4rem; letter-spacing: 0.2em;
    border-bottom: 1px solid var(--amber-dim); padding-bottom: 6px;
  }
  #modal-video-title {
    font-size: 0.95rem; color: var(--amber); line-height: 1.4;
  }
  #modal-meta { font-size: 0.8rem; color: var(--amber-dim); }
  #modal-ai-status {
    font-size: 0.78rem; color: var(--amber-dim); min-height: 1.2em; letter-spacing: 0.1em;
  }
  #modal-ai-status.classifying { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #modal-reasoning { font-size: 0.78rem; color: var(--amber-dim); font-style: italic; display: none; }
  #modal-new-category {
    display: none; padding: 8px 10px; border: 1px solid var(--amber);
    background: var(--amber-faint); font-size: 0.85rem;
  }
  #modal-new-category .new-cat-name { color: var(--amber); letter-spacing: 0.1em; }
  #modal-new-category .new-cat-actions { display: flex; gap: 6px; margin-top: 8px; }
  .new-cat-accept {
    padding: 4px 12px; border: 1px solid var(--amber); background: transparent;
    color: var(--amber); cursor: pointer; font-family: inherit; font-size: 0.8rem; letter-spacing: 0.15em;
  }
  .new-cat-accept:hover { background: var(--amber); color: var(--dark); }
  .new-cat-reject {
    padding: 4px 12px; border: 1px solid var(--amber-dim); background: transparent;
    color: var(--amber-dim); cursor: pointer; font-family: inherit; font-size: 0.8rem; letter-spacing: 0.15em;
  }
  .new-cat-reject:hover { border-color: var(--amber); color: var(--amber); }
  .new-cat-input-row { display:none; margin-top:4px; gap:4px; }
  .new-cat-check-btn {
    padding: 4px 10px; border: 1px solid var(--amber-dim); background: transparent;
    color: var(--amber); cursor: pointer; font-family: inherit; font-size: 1rem; flex-shrink:0;
  }
  .new-cat-check-btn:hover { border-color: var(--amber); background: var(--amber-faint); }
  .new-cat-confirm {
    display:none; margin-top:6px; padding: 8px 10px;
    border: 1px solid var(--amber); background: var(--amber-faint);
    font-size: 0.85rem; letter-spacing: 0.08em;
  }
  .new-cat-confirm .slug { color: var(--amber); font-weight: bold; letter-spacing: 0.15em; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .modal-queue-btn {
    flex: 2; padding: 10px; border: 1px solid var(--amber);
    background: var(--amber-faint); color: var(--amber); cursor: pointer;
    font-family: 'VT323', monospace; font-size: 1.3rem; letter-spacing: 0.2em;
    transition: all 0.1s;
  }
  .modal-queue-btn:hover { background: var(--amber); color: var(--dark); }
  .modal-queue-btn:disabled { opacity: 0.4; cursor: default; background: transparent; }
  .modal-cancel-btn {
    flex: 1; padding: 10px; border: 1px solid var(--amber-dim);
    background: transparent; color: var(--amber-dim); cursor: pointer;
    font-family: inherit; font-size: 0.85rem; letter-spacing: 0.15em;
    transition: all 0.1s;
  }
  .modal-cancel-btn:hover { border-color: var(--red-bright); color: var(--red-bright); }

  /* ── Right panel: queue ── */
  .panel-queue {
    padding: 20px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }

  .section-title {
    font-size: 0.8rem; letter-spacing: 0.3em; color: var(--amber);
    border-bottom: 1px solid var(--amber-dim); padding-bottom: 4px;
    display: flex; justify-content: space-between;
  }

  .job-list { display: flex; flex-direction: column; gap: 4px; }

  .job-row {
    border: 1px solid var(--amber-faint); padding: 7px 10px;
    display: flex; flex-direction: column; gap: 3px;
    font-size: 0.9rem; cursor: pointer;
  }
  .job-row:hover { border-color: var(--amber-dim); }
  .job-row.running { border-color: var(--green); }
  .job-row.failed { border-color: var(--red-bright); }
  .job-row.done { opacity: 0.6; }

  .job-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .job-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-badge {
    font-size: 0.75rem; letter-spacing: 0.15em; padding: 1px 5px; border: 1px solid;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-running { color: var(--green); border-color: var(--green); }
  .badge-pending { color: var(--amber-dim); border-color: var(--amber-dim); }
  .badge-done { color: var(--amber-dim); border-color: var(--amber-faint); }
  .badge-failed { color: var(--red-bright); border-color: var(--red-bright); }
  .badge-cancelled { color: var(--amber-dim); border-color: var(--amber-faint); }
  .badge-pipeline {
    font-size: 0.65rem; letter-spacing: 0.1em; padding: 1px 4px; border: 1px solid;
    white-space: nowrap; flex-shrink: 0; opacity: 0.8;
  }
  .badge-zikzak { color: #00cc66; border-color: #006633; }
  .badge-live    { color: var(--green); border-color: var(--green); }
  .badge-check-failed { color: var(--amber-dim); border-color: var(--amber-faint); }

  .job-meta { font-size: 0.78rem; color: var(--amber-dim); }

  .cancel-btn {
    font-size: 0.75rem; padding: 1px 6px; border: 1px solid var(--amber-dim);
    background: transparent; color: var(--amber-dim); cursor: pointer; font-family: inherit;
  }
  .cancel-btn:hover { border-color: var(--red-bright); color: var(--red-bright); }

  .log-pane {
    display: none; background: #000; border: 1px solid var(--amber-faint);
    padding: 8px; margin-top: 4px;
    max-height: 200px; overflow-y: auto;
  }
  .log-pane.open { display: block; }
  .log-pane pre { font-size: 0.6rem; color: var(--green-dim); white-space: pre-wrap; word-break: break-all; }

  .empty-msg { font-size: 0.85rem; color: var(--amber-dim); letter-spacing: 0.15em; padding: 8px 0; }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; height: auto; }
    .panel-submit { border-right: none; border-bottom: 1px solid var(--amber-dim); }
  }
</style>
</head>
<body>

<div class="scanner"></div>

<header>
  <h1>MHBN</h1>
  <span class="sub">// INTAKE STATION //</span>
</header>

<main>

  <!-- ── Submit panel ── -->
  <div class="panel-submit">

    <div class="panel-title">ADD TO QUEUE</div>

    <!-- Source type tabs -->
    <div>
      <label>SOURCE TYPE</label>
      <div class="source-tabs">
        <button class="tab active" onclick="setSource('youtube')">YOUTUBE</button>
        <button class="tab" onclick="setSource('ia')">INTERNET ARCHIVE</button>
      </div>
    </div>

    <!-- URL input (YouTube + IA) -->
    <div id="url-section">
      <label id="url-label">YOUTUBE URL</label>
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
    </div>

    <button class="analyze-btn" onclick="analyzeUrl()" id="analyze-btn">⚡ ANALYZE URL</button>

    <!-- Playlist toggle (YouTube only) -->
    <div id="playlist-toggle">
      <input type="checkbox" id="is-playlist">
      <span>PLAYLIST URL (expand all videos)</span>
    </div>

    <!-- Category -->
    <div>
      <label>CATEGORY</label>
      <select id="category" onchange="handleCategoryChange(this, 'main-new-cat-row')">
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat.replace('_', ' ').upper() }}</option>
        {% endfor %}
        <option value="__new__">＋ ADD NEW CATEGORY...</option>
      </select>
      <div id="main-new-cat-row" class="new-cat-input-row">
        <input type="text" id="new-category-input" placeholder="new_category_name" style="flex:1"
          onkeydown="if(event.key==='Enter')proposeCategory('main')">
        <button class="new-cat-check-btn" onclick="proposeCategory('main')">✓</button>
      </div>
      <div id="main-new-cat-confirm" class="new-cat-confirm">
        ADD NEW CATEGORY: <span class="slug" id="main-pending-slug-display"></span>?
        <div class="new-cat-actions">
          <button class="new-cat-accept" onclick="confirmCategory('main')">OK</button>
          <button class="new-cat-reject" onclick="cancelCategory('main')">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- Length -->
    <div>
      <label>LENGTH</label>
      <div class="length-group">
        <button class="len-btn active" onclick="setLength('auto')">AUTO</button>
        <button class="len-btn" onclick="setLength('short')">SHORT &lt;5m</button>
        <button class="len-btn" onclick="setLength('medium')">MEDIUM 5-30m</button>
        <button class="len-btn" onclick="setLength('long')">LONG &gt;30m</button>
      </div>
    </div>

    <button class="submit-btn" onclick="submitJob()">▶ QUEUE IT</button>
    <div id="submit-msg"></div>

  </div>

  <!-- ── Queue panel ── -->
  <div class="panel-queue">

    <div>
      <div class="section-title">
        <span>ACTIVE / PENDING</span>
        <span id="queue-count"></span>
      </div>
      <div class="job-list" id="queue-list">
        <div class="empty-msg">NO JOBS QUEUED</div>
      </div>
    </div>

    <div>
      <div class="section-title"><span>RECENT</span></div>
      <div class="job-list" id="recent-list">
        <div class="empty-msg">NO COMPLETED JOBS</div>
      </div>
    </div>

  </div>
</main>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-header">// CONFIRM QUEUE //</div>
    <div id="modal-video-title"></div>
    <div id="modal-meta"></div>
    <div>
      <label>CATEGORY</label>
      <select id="modal-category" onchange="handleCategoryChange(this, 'modal-new-cat-row')">
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat.replace('_', ' ').upper() }}</option>
        {% endfor %}
        <option value="__new__">＋ ADD NEW CATEGORY...</option>
      </select>
      <div id="modal-new-cat-row" class="new-cat-input-row">
        <input type="text" id="modal-new-category-input" placeholder="new_category_name" style="flex:1"
          onkeydown="if(event.key==='Enter')proposeCategory('modal')">
        <button class="new-cat-check-btn" onclick="proposeCategory('modal')">✓</button>
      </div>
      <div id="modal-new-cat-confirm" class="new-cat-confirm">
        ADD NEW CATEGORY: <span class="slug" id="modal-pending-slug-display"></span>?
        <div class="new-cat-actions">
          <button class="new-cat-accept" onclick="confirmCategory('modal')">OK</button>
          <button class="new-cat-reject" onclick="cancelCategory('modal')">CANCEL</button>
        </div>
      </div>
    </div>
    <div>
      <label>LENGTH</label>
      <div class="length-group" id="modal-length-group">
        <button class="len-btn" onclick="setModalLength('short')">SHORT &lt;5m</button>
        <button class="len-btn" onclick="setModalLength('medium')">MEDIUM 5-30m</button>
        <button class="len-btn" onclick="setModalLength('long')">LONG &gt;30m</button>
      </div>
    </div>
    <div id="modal-new-category">
      <div>⚡ AI SUGGESTS NEW CATEGORY: <span class="new-cat-name" id="modal-new-cat-name"></span></div>
      <div class="new-cat-actions">
        <button class="new-cat-accept" onclick="acceptNewCategory()">USE IT</button>
        <button class="new-cat-reject" onclick="rejectNewCategory()">PICK EXISTING</button>
      </div>
    </div>
    <div id="modal-ai-status"></div>
    <div id="modal-reasoning"></div>
    <div id="modal-error" style="display:none;font-size:0.8rem;color:var(--red-bright);letter-spacing:0.1em"></div>
    <div class="modal-actions">
      <button class="modal-queue-btn" id="modal-queue-btn" onclick="queueFromModal()">▶ QUEUE IT</button>
      <button class="modal-cancel-btn" onclick="closeModal()">✕ CANCEL</button>
    </div>
  </div>
</div>

<script>
const BASE = '{{ base_path }}';
const headers = () => ({ 'Content-Type': 'application/json' });
const url = path => BASE + path;

let currentSource = 'youtube';
let currentLength = 'auto';
let expandedLogIds = new Set();
let logIntervals = {};
let modalSource = '', modalUrl = '', modalLength = 'medium';

function setSource(s) {
  currentSource = s;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['youtube','ia'][i] === s);
  });
  document.getElementById('playlist-toggle').style.display = s === 'youtube' ? '' : 'none';
  document.getElementById('url-label').textContent = s === 'ia' ? 'ARCHIVE.ORG IDENTIFIER OR URL' : 'YOUTUBE URL';
  document.getElementById('url-input').placeholder = s === 'ia'
    ? 'archive.org/details/… or identifier' : 'https://youtube.com/watch?v=…';
}

function setLength(l) {
  currentLength = l;
  document.querySelectorAll('.len-btn').forEach((b, i) => {
    b.classList.toggle('active', ['auto','short','medium','long'][i] === l);
  });
}

function msg(text, type) {
  const el = document.getElementById('submit-msg');
  el.textContent = text;
  el.className = type;
}

function addCategoryToSelect(selectId, catName) {
  const slug = catName.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  if (!slug) return null;
  const sel = document.getElementById(selectId);
  if (!sel.querySelector(`option[value="${slug}"]`)) {
    const opt = document.createElement('option');
    opt.value = slug;
    opt.textContent = slug.replace(/_/g, ' ').toUpperCase();
    // Insert before the __new__ option
    sel.insertBefore(opt, sel.querySelector('option[value="__new__"]'));
  }
  sel.value = slug;
  return slug;
}

const _pendingSlug = { main: '', modal: '' };

function handleCategoryChange(sel, rowId) {
  const ns = rowId.startsWith('modal') ? 'modal' : 'main';
  const row = document.getElementById(rowId);
  const confirm = document.getElementById(ns + '-new-cat-confirm');
  if (sel.value === '__new__') {
    row.style.display = 'flex';
    confirm.style.display = 'none';
    row.querySelector('input').value = '';
    row.querySelector('input').focus();
  } else {
    row.style.display = 'none';
    confirm.style.display = 'none';
  }
}

function proposeCategory(ns) {
  const inp = document.getElementById(ns + '-new-category-input');
  const slug = inp.value.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  if (!slug) { inp.focus(); return; }
  _pendingSlug[ns] = slug;
  document.getElementById(ns + '-new-cat-row').style.display = 'none';
  document.getElementById(ns + '-pending-slug-display').textContent = slug.replace(/_/g, ' ').toUpperCase();
  document.getElementById(ns + '-new-cat-confirm').style.display = 'block';
}

function confirmCategory(ns) {
  const slug = _pendingSlug[ns];
  if (!slug) return;
  addCategoryToSelect('category', slug);
  addCategoryToSelect('modal-category', slug);
  document.getElementById(ns + '-new-cat-confirm').style.display = 'none';
  _pendingSlug[ns] = '';
}

function cancelCategory(ns) {
  document.getElementById(ns + '-new-cat-confirm').style.display = 'none';
  const row = document.getElementById(ns + '-new-cat-row');
  row.style.display = 'flex';
  row.querySelector('input').focus();
}

function formatDuration(s) {
  if (!s) return 'unknown duration';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function setModalLength(l) {
  modalLength = l;
  document.querySelectorAll('#modal-length-group .len-btn').forEach((b, i) => {
    b.classList.toggle('active', ['short','medium','long'][i] === l);
  });
}

function openModal(title, durationSeconds, length) {
  document.getElementById('modal-video-title').textContent = title || '(untitled)';
  document.getElementById('modal-meta').textContent = durationSeconds ? formatDuration(durationSeconds) : 'duration: calculating...';
  document.getElementById('modal-category').value = '{{ categories[0] }}';
  setModalLength(length || 'medium');
  const status = document.getElementById('modal-ai-status');
  status.textContent = '⚡ AI CLASSIFYING...';
  status.className = 'classifying';
  document.getElementById('modal-reasoning').style.display = 'none';
  document.getElementById('modal-new-category').style.display = 'none';
  _pendingNewCategory = '';
  document.getElementById('modal-new-cat-row').style.display = 'none';
  document.getElementById('modal-new-cat-confirm').style.display = 'none';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

let _pendingNewCategory = '';

function fillModalAI(category, isNew, length, reasoning, durationSeconds) {
  if (length && length !== 'unknown') setModalLength(length);
  if (durationSeconds) document.getElementById('modal-meta').textContent = formatDuration(durationSeconds);

  const status = document.getElementById('modal-ai-status');
  const newCatEl = document.getElementById('modal-new-category');

  if (isNew && category) {
    _pendingNewCategory = category;
    document.getElementById('modal-new-cat-name').textContent = category.replace(/_/g, ' ').toUpperCase();
    newCatEl.style.display = 'block';
    status.textContent = '';
  } else {
    newCatEl.style.display = 'none';
    if (category) document.getElementById('modal-category').value = category;
    status.textContent = '✓ AI CLASSIFIED';
    status.className = '';
  }

  const r = document.getElementById('modal-reasoning');
  if (reasoning) { r.textContent = reasoning; r.style.display = 'block'; }
}

function acceptNewCategory() {
  if (!_pendingNewCategory) return;
  addCategoryToSelect('modal-category', _pendingNewCategory);
  document.getElementById('modal-new-category').style.display = 'none';
  const status = document.getElementById('modal-ai-status');
  status.textContent = '✓ NEW CATEGORY ACCEPTED';
  status.className = '';
}

function rejectNewCategory() {
  _pendingNewCategory = '';
  document.getElementById('modal-new-category').style.display = 'none';
  const status = document.getElementById('modal-ai-status');
  status.textContent = 'SELECT A CATEGORY BELOW';
  status.className = '';
  document.getElementById('modal-category').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function modalError(text) {
  const el = document.getElementById('modal-error');
  el.textContent = text;
  el.style.display = 'block';
}

async function queueFromModal() {
  const cat = document.getElementById('modal-category').value;
  if (cat === '__new__') {
    modalError('CONFIRM THE NEW CATEGORY NAME FIRST');
    proposeCategory('modal');
    return;
  }
  document.getElementById('modal-error').style.display = 'none';
  const btn = document.getElementById('modal-queue-btn');
  btn.disabled = true;
  try {
    const body = {
      source: modalSource,
      urls: [modalUrl],
      category: cat,
      length: modalLength,
      playlist: false,
    };
    const res = await fetch(url('/api/submit'), { method: 'POST', headers: headers(), body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { modalError('ERROR: ' + (data.error || res.status)); return; }
    addCategoryToSelect('category', cat);  // sync new category to main form
    closeModal();
    document.getElementById('url-input').value = '';
    msg(`QUEUED ${data.queued} JOB${data.queued !== 1 ? 'S' : ''}`, 'ok');
    refreshQueue();
  } catch (e) {
    modalError('REQUEST FAILED: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function analyzeUrl() {
  const rawUrl = document.getElementById('url-input').value.trim();
  if (!rawUrl) { msg('ENTER A URL FIRST', 'err'); return; }

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = '⚡ FETCHING...';
  msg('', '');

  try {
    // Phase 1: fast title + duration
    const qRes = await fetch(url('/api/quickmeta'), {
      method: 'POST', headers: headers(),
      body: JSON.stringify({ source: currentSource, url: rawUrl }),
    });
    if (!qRes.ok) {
      let errMsg = qRes.status;
      try { const d = await qRes.json(); errMsg = d.error || qRes.status; } catch {}
      msg('ERROR: ' + errMsg, 'err');
      return;
    }
    const qData = await qRes.json();
    modalSource = currentSource;
    modalUrl = rawUrl;
    openModal(qData.title, qData.duration_seconds, qData.length);

    // Phase 2: AI classification fills in modal as it arrives
    fetch(url('/api/analyze'), {
      method: 'POST', headers: headers(),
      body: JSON.stringify({ source: currentSource, url: rawUrl }),
    }).then(r => r.json()).then(data => {
      if (!document.getElementById('modal-overlay').classList.contains('open')) return;
      if (data.error) {
        const s = document.getElementById('modal-ai-status');
        s.textContent = 'AI: ' + data.error; s.className = '';
        return;
      }
      const len = (data.length && data.length !== 'unknown') ? data.length : modalLength;
      fillModalAI(data.category, data.is_new_category, len, data.reasoning, data.duration_seconds);
    }).catch(() => {
      const s = document.getElementById('modal-ai-status');
      if (s) { s.textContent = 'AI unavailable'; s.className = ''; }
    });

  } catch (e) {
    msg('ERROR: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ ANALYZE URL';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function submitJob() {
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  msg('PROCESSING...', '');

  try {
    let body;

    if (currentSource === 'ia') {
      const rawUrl = document.getElementById('url-input').value.trim();
      if (!rawUrl) { msg('ENTER AN IDENTIFIER', 'err'); return; }
      const cat = document.getElementById('category').value;
      if (cat === '__new__') { msg('ENTER A CATEGORY NAME', 'err'); return; }
      body = { source: 'ia', urls: [rawUrl], category: cat, length: currentLength };
    } else {
      const rawUrl = document.getElementById('url-input').value.trim();
      if (!rawUrl) { msg('ENTER A URL', 'err'); return; }
      const cat = document.getElementById('category').value;
      if (cat === '__new__') { msg('ENTER A CATEGORY NAME', 'err'); return; }
      body = {
        source: 'youtube',
        urls: [rawUrl],
        playlist: document.getElementById('is-playlist').checked,
        category: cat,
        length: currentLength,
      };
    }

    const res = await fetch(url('/api/submit'), { method: 'POST', headers: headers(), body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { msg('ERROR: ' + (data.error || res.status), 'err'); return; }

    msg(`QUEUED ${data.queued} JOB${data.queued !== 1 ? 'S' : ''}`, 'ok');
    document.getElementById('url-input').value = '';
    refreshQueue();
  } catch (e) {
    msg('REQUEST FAILED: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}


async function cancelJob(id, e) {
  e.stopPropagation();
  await fetch(url(`/api/job/${id}/cancel`), { method: 'POST', headers: headers() });
  refreshQueue();
}

function toggleLog(id) {
  const pane = document.getElementById(`log-${id}`);
  if (!pane) return;
  const isOpen = pane.classList.toggle('open');
  if (isOpen) {
    expandedLogIds.add(id);
    fetchLog(id);
    logIntervals[id] = setInterval(() => fetchLog(id), 2000);
  } else {
    expandedLogIds.delete(id);
    clearInterval(logIntervals[id]);
    delete logIntervals[id];
  }
}

async function fetchLog(id) {
  const pane = document.getElementById(`log-${id}`);
  if (!pane) return;
  try {
    const res = await fetch(url(`/api/job/${id}/log?tail=40`), { headers: headers() });
    const data = await res.json();
    const pre = pane.querySelector('pre');
    if (pre) pre.textContent = data.lines.join('\n');
    pane.scrollTop = pane.scrollHeight;
  } catch {}
}

function jobRow(job, showCancel) {
  const statusBadge = {
    running: '<span class="job-badge badge-running">▶ RUNNING</span>',
    pending: '<span class="job-badge badge-pending">⏳ PENDING</span>',
    done:    '<span class="job-badge badge-done">✓ DONE</span>',
    failed:  '<span class="job-badge badge-failed">✗ FAILED</span>',
    cancelled: '<span class="job-badge badge-cancelled">— CANCELLED</span>',
  }[job.status] || '';

  const cancelBtn = showCancel
    ? `<button class="cancel-btn" onclick="cancelJob(${job.id}, event)">CANCEL</button>`
    : '';

  const pipelineBadge = {
    on_zikzak:    '<span class="badge-pipeline badge-zikzak">→ ZIKZAK</span>',
    live:         '<span class="badge-pipeline badge-live">▶ LIVE</span>',
    check_failed: '<span class="badge-pipeline badge-check-failed">? CHECK FAILED</span>',
  }[job.pipeline_status] || '';

  const title = job.title || job.url;
  const meta = `${job.source.toUpperCase()} · ${job.category.replace(/_/g,' ')} · ${job.length}`;
  const error = job.error_msg ? `<div class="job-meta" style="color:var(--red-bright)">${escHtml(job.error_msg)}</div>` : '';

  return `
    <div class="job-row ${job.status}" onclick="toggleLog(${job.id})">
      <div class="job-top">
        <span class="job-title">${escHtml(title)}</span>
        ${statusBadge}
        ${pipelineBadge}
        ${cancelBtn}
      </div>
      <div class="job-meta">${escHtml(meta)}</div>
      ${error}
      <div class="log-pane ${expandedLogIds.has(job.id) ? 'open' : ''}" id="log-${job.id}">
        <pre></pre>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refreshQueue() {
  try {
    const [qRes, rRes] = await Promise.all([
      fetch(url('/api/queue'), { headers: headers() }),
      fetch(url('/api/recent'), { headers: headers() }),
    ]);
    const queue = await qRes.json();
    const recent = await rRes.json();

    const ql = document.getElementById('queue-list');
    const qc = document.getElementById('queue-count');
    if (queue.length === 0) {
      ql.innerHTML = '<div class="empty-msg">NO JOBS QUEUED</div>';
      qc.textContent = '';
    } else {
      ql.innerHTML = queue.map(j => jobRow(j, j.status === 'running' || j.status === 'pending')).join('');
      qc.textContent = `${queue.length}`;
    }

    const rl = document.getElementById('recent-list');
    if (recent.length === 0) {
      rl.innerHTML = '<div class="empty-msg">NO COMPLETED JOBS</div>';
    } else {
      rl.innerHTML = recent.map(j => jobRow(j, false)).join('');
    }

    // Refresh open log panes
    expandedLogIds.forEach(id => {
      const pane = document.getElementById(`log-${id}`);
      if (pane && !logIntervals[id]) {
        logIntervals[id] = setInterval(() => fetchLog(id), 2000);
      }
      if (pane) fetchLog(id);
    });
  } catch {}
}

// Poll every 3 seconds
setInterval(refreshQueue, 3000);
refreshQueue();
</script>
